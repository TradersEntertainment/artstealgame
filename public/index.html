<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Museum Heist - Çok Oyunculu FPS Sanat Soygunu Oyunu">
  <title>MUSEUM HEIST</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --primary: #ef4444;
      --primary-hover: #dc2626;
      --text: #ffffff;
      --accent: #c9a96e;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 2rem;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(200, 0, 0, 0.1) 0%, transparent 70%),
                  url('https://www.transparenttextures.com/patterns/stardust.png');
      z-index: -1;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      0% { text-shadow: 0 0 20px rgba(201, 169, 110, 0.2); }
      100% { text-shadow: 0 0 40px rgba(201, 169, 110, 0.6); }
    }
    .subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #999;
      max-width: 600px;
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    .action-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2.5rem;
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 400px;
    }
    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .name-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 1rem;
      border-radius: 0.5rem;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus {
      border-color: var(--primary);
    }
    .play-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 0.5rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .play-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
    }
    .play-btn:active {
      transform: translateY(0);
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 4rem;
      flex-wrap: wrap;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .feature svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-bg"></div>
    <h1 class="title">MUSEUM HEIST</h1>
    <p class="subtitle">Çok Oyunculu Bayrak Kapmaca FPS. Diğer hırsızlarla savaş, tabloları çal ve kendi üssüne getirerek skor kazan.</p>
    
    <div class="action-panel">
      <div class="input-group">
        <label for="player-name">Kod Adı</label>
        <input type="text" id="player-name" class="name-input" placeholder="Hırsız_01" maxlength="16" autocomplete="off">
      </div>
      <button class="play-btn" onclick="startGame()">OYUNA GİR</button>
    </div>

    <div class="features">
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        Eser Taşıma Sistemi
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Gerçek Zamanlı FPS
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Üs (Base) Savunması
      </div>
    </div>
  </div>

  <script>
    function startGame() {
      const nameInput = document.getElementById('player-name').value.trim();
      let url = '3d.html';
      if (nameInput) {
        url += '?name=' + encodeURIComponent(nameInput);
      }
      window.location.href = url;
    }

    // Enter key support
    document.getElementById('player-name').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        startGame();
      }
    });
  </script>
</body>
</html>
